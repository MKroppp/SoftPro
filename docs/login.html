<body>
    <header>
        <div class="navigation">
            <nav>
                <div class="left-side">
                    <a href="index.html">SoftPro</a>
                </div>
                <div class="right-side">
                    <a href="news.html">NEWS</a>
                    <a href="faq.html">FAQ</a>
                    <a href="help.html">HELP</a>

                    <button class="logout-button" style="display:none;"><i class="fa-solid fa-arrow-right-from-bracket fa-xl"></i></button>

                <button id="menuButton"><i class="fa-solid fa-bars fa-2xl" style="color: #c5c5c5;"></i></button>

                </div>
            </nav>
        </div>
    </header>
    <main>
        <form class="loginForm" action="/login" method="post">
            <div class="login-form">
                <div class="login-description">
                    <h2>Login</h2>
                    <p>Enter your username and password</p>
                </div>
                <div class="data">
                    <input type="text" id="login" name="login" required placeholder="Login">
                    <input type="password" id="password" name="password" required placeholder="Password">
                    <button class="enter-button" type="submit">LOGIN</button>
                    <div id="g_id_onload"
                        data-client_id="898809875388-q8uk2q87fahcq1e3ftuj4cnid5mqikiq.apps.googleusercontent.com"
                        data-callback="handleCredentialResponse">
                    </div>
                    <div class="g_id_signin"
                        data-type="standard">
                    </div>
                </div>
                <div class="login-description">
                    <p>Don't have an account? <a href="register.html" style="text-decoration: underline;">SIGN UP</a></p>
                </div>
            </div>
        </form>
    </main>
